<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>EcoVolt Signup </title>

    <link rel="icon" type="image/png" href="/static/images/logo_neon.png">

    <!-- Template CSS -->
    <link rel="stylesheet" href="/static/css/style-liberty.css">

    <!-- google fonts -->
    <link href="https://fonts.googleapis.com/css?family=Nunito:300,400,600,700,800,900&display=swap" rel="stylesheet">
</head>

<body class="sidebar-menu-collapsed">
    <section>
        <div class="">
            <section class="register-form py-md-5 py-3">
                <div class="card card_border p-md-4">
                    <div class="card-body">

                        <form id="registerForm">
                            <div class="register__header text-center mb-lg-5 mb-4">
                                <h3 class="register__title mb-2">Signup</h3>
                                <p>Crie sua conta</p>
                            </div>

                            <div class="form-group">
                                <label class="input__label">Username</label>
                                <input type="text" id="username" class="form-control input-style" required>
                            </div>

                            <div class="form-group">
                                <label class="input__label">Email</label>
                                <input type="email" id="email" class="form-control input-style" required>
                            </div>

                            <div class="form-group">
                                <label class="input__label">Password</label>
                                <input type="password" id="password" class="form-control input-style" required>
                            </div>

                            <div id="error" class="form-error"></div>
                            <div id="success" class="form-success"></div>


                            <button type="submit" class="btn btn-primary btn-style mt-4">
                                Criar Conta
                            </button>

                            <p class="signup mt-4">
                                Já tem uma conta?
                                <a href="/login">Login</a>
                            </p>
                        </form>

                    </div>
                </div>
            </section>
        </div>
    </section>

    <script>
        const form = document.getElementById("registerForm");

        const errorDiv = document.getElementById("error");
        const successDiv = document.getElementById("success");

        const usernameInput = document.getElementById("username");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");

        const registerBtn = form.querySelector("button[type='submit']");

        // Estado inicial
        hideError();
        hideSuccess();

        // Helpers
        function showError(message) {
            errorDiv.innerText = message;
            errorDiv.style.display = "block";
        }

        function hideError() {
            errorDiv.innerText = "";
            errorDiv.style.display = "none";
        }

        function showSuccess(message) {
            successDiv.innerText = message;
            successDiv.style.display = "block";
        }

        function hideSuccess() {
            successDiv.innerText = "";
            successDiv.style.display = "none";
        }

        // Limpa mensagens quando o user escreve
        [usernameInput, emailInput, passwordInput].forEach(input => {
            input.addEventListener("input", () => {
                hideError();
                hideSuccess();
            });
        });

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            hideError();
            hideSuccess();

            const username = usernameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Validação básica frontend
            if (!username || !email || !password) {
                showError("Preencha todos os campos.");
                return;
            }

            // Loading state
            registerBtn.disabled = true;
            const originalText = registerBtn.innerText;
            registerBtn.innerText = "A criar conta...";

            try {
                const response = await fetch("/api/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    // Erros de validação (Pydantic)
                    if (Array.isArray(data.detail)) {
                        showError(
                            data.detail.map(err => err.msg).join("\n")
                        );
                    }
                    // Erro normal (HTTPException)
                    else if (typeof data.detail === "string") {
                        showError(data.detail);
                    }
                    // Fallback
                    else {
                        showError("Dados inválidos.");
                    }
                    return;
                }

                // Sucesso
                showSuccess("Conta criada com sucesso. Para fazer login por favor confirme no seu email.");
                form.reset();

            } catch (error) {
                showError("Erro de ligação ao servidor.");
                console.error(error);
            } finally {
                registerBtn.disabled = false;
                registerBtn.innerText = originalText;
            }
        });
    </script>




</body>



</html>
