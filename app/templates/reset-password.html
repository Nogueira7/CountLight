<!doctype html>
<html lang="pt-PT">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>CountLight | Redefinir Password</title>
  <link rel="icon" type="image/png" href="/static/images/logo_neon.png">
  <link rel="stylesheet" href="/static/css/style-liberty.css">
  <link href="https://fonts.googleapis.com/css?family=Nunito:300,400,600,700,800,900&display=swap" rel="stylesheet">
</head>

<body class="sidebar-menu-collapsed">
  <section>
    <div class="">
      <section class="login-form py-md-5 py-3">
        <div class="card card_border p-md-4">
          <div class="card-body">

            <form id="resetForm">
              <div class="login__header text-center mb-lg-5 mb-4">
                <h3 class="login__title mb-2">Nova Password</h3>
                <p>Define uma nova palavra-passe para a tua conta</p>
              </div>

              <div class="form-group">
                <label class="input__label">Nova Password</label>
                <input type="password" class="form-control login_text_field_bg input-style" id="password" required>
              </div>

              <div class="form-group">
                <label class="input__label">Confirmar Password</label>
                <input type="password" class="form-control login_text_field_bg input-style" id="confirmPassword" required>
              </div>

              <div id="error" class="form-error"></div>
              <div id="success" class="form-success" style="display:none;"></div>

              <button type="submit" id="resetBtn" class="btn btn-primary btn-style mt-4">
                Guardar nova password
              </button>

              <p class="signup mt-4">
                <a href="/login">Voltar ao login</a>
              </p>
            </form>

          </div>
        </div>
      </section>
    </div>
  </section>

  <script>
    const API_URL = "/api";

    const form = document.getElementById("resetForm");
    const passwordInput = document.getElementById("password");
    const confirmInput = document.getElementById("confirmPassword");
    const errorDiv = document.getElementById("error");
    const successDiv = document.getElementById("success");
    const resetBtn = document.getElementById("resetBtn");

    function showError(message) {
      errorDiv.innerText = message;
      errorDiv.style.display = "block";
      successDiv.style.display = "none";
    }

    function showSuccess(message) {
      successDiv.innerText = message;
      successDiv.style.display = "block";
      errorDiv.style.display = "none";
    }

    function clearMessages() {
      errorDiv.innerText = "";
      errorDiv.style.display = "none";
      successDiv.innerText = "";
      successDiv.style.display = "none";
    }

    function getToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get("token");
    }

    passwordInput.addEventListener("input", clearMessages);
    confirmInput.addEventListener("input", clearMessages);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessages();

      const password = passwordInput.value;
      const confirm = confirmInput.value;
      const token = getToken();

      if (!token) {
        showError("Token inválido.");
        return;
      }

      if (!password || !confirm) {
        showError("Preenche todos os campos.");
        return;
      }

      if (password.length < 6) {
        showError("A password deve ter pelo menos 6 caracteres.");
        return;
      }

      if (password !== confirm) {
        showError("As passwords não coincidem.");
        return;
      }

      resetBtn.disabled = true;
      const originalText = resetBtn.innerText;
      resetBtn.innerText = "A guardar...";

      try {
        const formData = new URLSearchParams();
        formData.append("token", token);
        formData.append("password", password);

        const res = await fetch(`${API_URL}/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: formData
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || "Erro ao redefinir password.");
          return;
        }

        showSuccess("Password atualizada com sucesso! 🎉");

        // 👉 redirecionar para login
        setTimeout(() => {
          window.location.href = "/login";
        }, 2000);

      } catch (err) {
        showError("Erro de ligação ao servidor.");
      } finally {
        resetBtn.disabled = false;
        resetBtn.innerText = originalText;
      }
    });
  </script>
</body>

</html>
