<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>CountLight Login</title>
  <link rel="icon" type="image/png" href="/static/images/logo_neon.png">
  <link rel="stylesheet" href="/static/css/style-liberty.css">
  <link href="https://fonts.googleapis.com/css?family=Nunito:300,400,600,700,800,900&display=swap" rel="stylesheet">
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
</head>

<body class="sidebar-menu-collapsed">
  <section>
    <div class="">
      <section class="login-form py-md-5 py-3">
        <div class="card card_border p-md-4">
          <div class="card-body">

            <form id="loginForm">
              <div class="login__header text-center mb-lg-5 mb-4">
                <h3 class="login__title mb-2">Login</h3>
                <p>Bem-vindo(a) de volta, faça login para continuar.</p>
              </div>

              <div class="form-group">
                <label class="input__label">Username ou Email</label>
                <input type="text" class="form-control login_text_field_bg input-style" id="username" required>
              </div>

              <div class="form-group">
                <label class="input__label">Password</label>
                <input type="password" class="form-control login_text_field_bg input-style" id="password" required>
              </div>

              <div id="error" class="form-error"></div>

              <button type="submit" id="loginBtn" class="btn btn-primary btn-style mt-4">
                Login
              </button>

              <div class="text-center mt-3">
                <div style="margin: 15px 0; font-size: 14px; color: #6b7280;">
                  ou
                </div>

                <div id="googleBtn"></div>
              </div>

              <p class="signup mt-4">
                Esqueceu-se da sua palavra-passe?
                <a href="/forgot-password">Recuperar</a>
              </p>

              <p class="signup mt-4">
                Ainda não tem uma conta?
                <a href="/register">Registar</a>
              </p>
            </form>

          </div>
        </div>
      </section>
    </div>
  </section>

  <script>
    const API_URL = "/api";

    const form = document.getElementById("loginForm");
    const errorDiv = document.getElementById("error");
    const loginBtn = document.getElementById("loginBtn");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");

    function showError(message) {
      errorDiv.innerText = message;
      errorDiv.style.display = "block";
    }

    function hideError() {
      errorDiv.innerText = "";
      errorDiv.style.display = "none";
    }

    async function safeJson(res) {
      const ct = res.headers.get("content-type") || "";
      if (!ct.includes("application/json")) return null;
      try { return await res.json(); } catch { return null; }
    }

    usernameInput.addEventListener("input", hideError);
    passwordInput.addEventListener("input", hideError);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError();

      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        showError("Preencha todos os campos.");
        return;
      }

      loginBtn.disabled = true;
      const originalText = loginBtn.innerText;
      loginBtn.innerText = "A autenticar...";

      try {
        // 🔐 LOGIN (PASSO 1)
        const formData = new URLSearchParams();
        formData.append("username", username);
        formData.append("password", password);

        const res = await fetch(`${API_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: formData,
        });

        const data = await safeJson(res);

        if (!res.ok) {
          const detail = data?.detail;
          if (Array.isArray(detail) && detail[0]?.msg) showError(detail[0].msg);
          else if (typeof detail === "string") showError(detail);
          else showError("Erro ao autenticar.");
          return;
        }

        // ✅ CASO 1: 2FA
        if (data && data["2fa_required"]) {
          localStorage.setItem("2fa_user_id", data.user_id);
          localStorage.setItem("2fa_username", username);

          window.location.href = "/verify-code";
          return;
        }

        // ✅ CASO 2: LOGIN DIRETO (ex: Google ou fallback)
        if (data && data.access_token) {
          const accessToken = data.access_token;

          const meRes = await fetch(`${API_URL}/users/me`, {
            headers: { Authorization: "Bearer " + accessToken }
          });

          const meData = await meRes.json();
          console.log("ME DATA:", meData);

          if (!meRes.ok) {
            showError("Erro ao obter utilizador.");
            return;
          }

          localStorage.setItem("access_token", accessToken);
          localStorage.setItem("token", accessToken);
          localStorage.setItem("user_id", meData.user_id);
          localStorage.setItem("role", meData.role);

          if (meData.role === "admin") {
            window.location.href = "/admin";
          } else {
            window.location.href = "/dashboard";
          }
          return;
        }

        // ❌ fallback
        showError("Erro no processo de autenticação.");

      } catch (err) {
        console.error(err);
        showError("Erro de ligação ao servidor.");
      } finally {
        loginBtn.disabled = false;
        loginBtn.innerText = originalText;
      }
    });

    // GOOGLE LOGIN (mantém igual)
    window.onload = function () {
      google.accounts.id.initialize({
        client_id: "513810347368-aci72pjbrbbpk7enga2h44rfc1amup17.apps.googleusercontent.com",
        callback: handleGoogleLogin
      });

      google.accounts.id.renderButton(
        document.getElementById("googleBtn"),
        { theme: "outline", size: "large" }
      );
    };

    async function handleGoogleLogin(response) {
      const token = response.credential;

      try {
        const res = await fetch("/api/google", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ token })
        });

        const data = await res.json();

        if (!res.ok) {
          showError("Erro no login com Google");
          return;
        }

        const accessToken = data.access_token;

        const meRes = await fetch("/api/users/me", {
          headers: { Authorization: "Bearer " + accessToken }
        });

        const meData = await meRes.json();
        console.log("ME DATA:", meData);

        if (!meRes.ok) {
          showError("Erro ao obter dados do utilizador");
          return;
        }

        // 🔐 guardar IGUAL ao login normal
        localStorage.setItem("access_token", accessToken);
        localStorage.setItem("token", accessToken); // 👈 FALTAVA
        localStorage.setItem("user_id", meData.user_id);
        localStorage.setItem("role", meData.role);

        if (meData.role === "admin") {
          window.location.href = "/admin";
        } else {
          window.location.href = "/dashboard";
        }

      } catch (err) {
        console.error(err);
        showError("Erro ao autenticar com Google");
      }
    }
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</body>

</html>
