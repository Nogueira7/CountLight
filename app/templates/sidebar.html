<!-- SCRIPT DINÂMICO DAS DIVISÕES -->
<script>
  document.addEventListener("DOMContentLoaded", async function () {

    const submenu = document.getElementById("rooms-submenu");
    if (!submenu) return;

    const token = localStorage.getItem("token");

    if (!token) {
      window.location.href = "/login";
      return;
    }

    try {
      // 🔹 Buscar casas
      const housesResponse = await fetch("/api/houses", {
        headers: {
          "Authorization": `Bearer ${token}`
        }
      });

      if (!housesResponse.ok) {
        console.error("Erro ao buscar casas");
        return;
      }

      const houses = await housesResponse.json();

      if (!houses.length) {
        submenu.innerHTML = "<li><a href='#'>Sem casas</a></li>";
        return;
      }

      const houseId = houses[0].id_house;

      // 🔹 Buscar divisões da casa
      const roomsResponse = await fetch(`/api/houses/${houseId}/rooms`, {
        headers: {
          "Authorization": `Bearer ${token}`
        }
      });

      if (!roomsResponse.ok) {
        console.error("Erro ao buscar divisões");
        return;
      }

      const rooms = await roomsResponse.json();

      submenu.innerHTML = "";

      if (!rooms.length) {
        submenu.innerHTML = "<li><a href='#'>Sem divisões</a></li>";
        return;
      }

      rooms.forEach(room => {
        const li = document.createElement("li");

        li.innerHTML = `
        <a href="/statsroom/${room.id_room}">
          ${room.name}
        </a>
      `;

        submenu.appendChild(li);
      });

    } catch (error) {
      console.error("Erro ao carregar divisões:", error);
    }

  });
</script>
