<!doctype html>
<html lang="pt-PT">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>CountLight | Recuperar Password</title>
  <link rel="icon" type="image/png" href="/static/images/logo_neon.png">
  <link rel="stylesheet" href="/static/css/style-liberty.css">
  <link href="https://fonts.googleapis.com/css?family=Nunito:300,400,600,700,800,900&display=swap" rel="stylesheet">
</head>

<body class="sidebar-menu-collapsed">
  <section>
    <div class="">
      <section class="login-form py-md-5 py-3">
        <div class="card card_border p-md-4">
          <div class="card-body">

            <form id="forgotForm">
              <div class="login__header text-center mb-lg-5 mb-4">
                <h3 class="login__title mb-2">Recuperar Password</h3>
                <p>Introduz o teu email para receber instruções</p>
              </div>

              <div class="form-group">
                <label class="input__label">Email</label>
                <input
                  type="email"
                  class="form-control login_text_field_bg input-style"
                  id="email"
                  placeholder="ex: nome@email.com"
                  required>
              </div>

              <div id="error" class="form-error"></div>
              <div id="success" class="form-success" style="display:none;"></div>

              <button type="submit" id="sendBtn" class="btn btn-primary btn-style mt-4">
                Enviar email de recuperação
              </button>

              <p class="signup mt-4">
                Lembrou-se da password?
                <a href="/login">Voltar ao login</a>
              </p>
            </form>

          </div>
        </div>
      </section>
    </div>
  </section>

  <script>
    const API_URL = "/api";

    const form = document.getElementById("forgotForm");
    const emailInput = document.getElementById("email");
    const errorDiv = document.getElementById("error");
    const successDiv = document.getElementById("success");
    const sendBtn = document.getElementById("sendBtn");

    function showError(message) {
      errorDiv.innerText = message;
      errorDiv.style.display = "block";
      successDiv.style.display = "none";
    }

    function showSuccess(message) {
      successDiv.innerText = message;
      successDiv.style.display = "block";
      errorDiv.style.display = "none";
    }

    function clearMessages() {
      errorDiv.innerText = "";
      errorDiv.style.display = "none";
      successDiv.innerText = "";
      successDiv.style.display = "none";
    }

    emailInput.addEventListener("input", clearMessages);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessages();

      const email = emailInput.value.trim();

      if (!email) {
        showError("Introduz o teu email.");
        return;
      }

      sendBtn.disabled = true;
      const originalText = sendBtn.innerText;
      sendBtn.innerText = "A enviar...";

      try {
        const res = await fetch(`${API_URL}/forgot-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        // 🔒 mensagem genérica (segurança)
        showSuccess("Se o email existir, vais receber instruções em breve 📩");

      } catch (err) {
        showError("Erro de ligação ao servidor.");
      } finally {
        sendBtn.disabled = false;
        sendBtn.innerText = originalText;
      }
    });
  </script>
</body>

</html>
