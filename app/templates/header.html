<!-- 🔔 NOTIFICATION SCRIPT -->
<!-- ===================== -->
<script>
  function getAuthContext() {
    // compatibilidade
    const token = localStorage.getItem("access_token") || localStorage.getItem("token");
    const houseId = localStorage.getItem("selectedHouseId") || localStorage.getItem("selected_house_id");
    return { token, houseId };
  }

  function setNotificationsUIEmpty() {
    const badge = document.getElementById("notification-count");
    const headerText = document.getElementById("notification-header-text");
    const items = document.getElementById("notification-items");

    if (badge) badge.style.display = "none";
    if (headerText) headerText.innerText = "Sem notificações";
    if (items) items.innerHTML = "";
  }

  function iconForType(type) {
    if (type === "achievement_completed") return "🏆";
    if (type === "goal_completed") return "🎯";
    if (type === "goal_failed") return "⚠️";
    return "🔔";
  }

  function renderNotificationItem(n) {
    const title = n?.title ? String(n.title) : "";
    const message = n?.message ? String(n.message) : "";
    const icon = iconForType(n?.type);

    const dt = n?.created_at ? new Date(n.created_at) : null;
    const formatted = dt ? dt.toLocaleString("pt-PT") : "";

    // is_read vem como 0/1 (tinyint)
    const isUnread = (n && (n.is_read === 0 || n.is_read === false));

    return `
      <li>
        <a href="/alerts" class="grid ${isUnread ? "unread" : ""}">
          <div class="user_img">
            <div style="width:40px;height:40px;border-radius:50%;background:#eef2f8;display:flex;align-items:center;justify-content:center;font-size:18px;">
              ${icon}
            </div>
          </div>
          <div class="notification_desc">
            <p>${title}</p>
            <span>${message ? message : formatted}</span>
          </div>
        </a>
      </li>
    `;
  }

  async function loadNotifications() {
    const { token, houseId } = getAuthContext();

    if (!token || !houseId) {
      setNotificationsUIEmpty();
      return;
    }

    try {
      const response = await fetch("/api/notifications", {
        headers: {
          "Authorization": "Bearer " + token,
          "X-House-Id": String(houseId),
        },
      });

      if (!response.ok) {
        console.log("Erro ao carregar notificações:", response.status);
        return;
      }

      const notifications = await response.json();

      const badge = document.getElementById("notification-count");
      const headerText = document.getElementById("notification-header-text");
      const items = document.getElementById("notification-items");

      if (!badge || !headerText || !items) return;

      if (!Array.isArray(notifications) || notifications.length === 0) {
        setNotificationsUIEmpty();
        return;
      }

      const unread = notifications.filter(n => n && (n.is_read === 0 || n.is_read === false));

      badge.style.display = unread.length ? "inline-block" : "none";
      badge.innerText = String(unread.length);

      headerText.innerText = unread.length
        ? `Tens ${unread.length} novas notificações`
        : "Sem novas notificações";

      const unreadOnly = notifications.filter(n => n && (n.is_read === 0 || n.is_read === false));
      items.innerHTML = unreadOnly.slice(0, 5).map(renderNotificationItem).join("");

      if (unread.length === 0) {
        items.innerHTML = "";
      }

    } catch (err) {
      console.error("Erro ao carregar notificações:", err);
    }
  }

  async function clearNotificationsBackend() {
    const { token, houseId } = getAuthContext();
    if (!token || !houseId) return;

    try {
      const res = await fetch("/api/notifications/read-all", {
        method: "PATCH",
        headers: {
          "Authorization": "Bearer " + token,
          "X-House-Id": String(houseId),
        },
      });

      if (!res.ok) {
        console.log("Erro ao limpar notificações:", res.status);
        return;
      }

      await loadNotifications();
    } catch (err) {
      console.error("Erro ao limpar notificações:", err);
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    setNotificationsUIEmpty();
    loadNotifications();
  });

  window.addEventListener("storage", function (e) {
    if (["selectedHouseId", "selected_house_id", "access_token", "token"].includes(e.key)) {
      loadNotifications();
    }
  });

  (function wireLogout() {
    const btn = document.getElementById("logout-btn");
    if (!btn) return;

    btn.addEventListener("click", function (ev) {
      ev.preventDefault();
      localStorage.removeItem("access_token");
      localStorage.removeItem("token");
      localStorage.removeItem("selectedHouseId");
      localStorage.removeItem("selected_house_id");
      window.location.href = "/login";
    });
  })();

  (function wireClearNotifications() {
    const btn = document.getElementById("clear-notifications-btn");
    if (!btn) return;

    btn.addEventListener("click", function (ev) {
      ev.preventDefault();
      clearNotificationsBackend();
    });
  })();
</script>

<!-- 👤 HEADER AVATAR + USER SEARCH SCRIPT -->
<!-- ===================== -->
<script>
  (function wireHeaderAvatarAndUserSearch() {
    const input = document.getElementById("search");
    const form = document.getElementById("user-search-form");
    const dropdown = document.getElementById("user-search-dropdown");

    const headerImg = document.getElementById("headerProfileImg");
    const headerUsername = document.getElementById("headerUsername");

    if (!input || !form || !dropdown) return;

    const DEFAULT_AVATAR = "/static/images/profile_photos/default-avatar.png";

    function normalizePhotoUrl(photoUrl) {
      if (!photoUrl) return DEFAULT_AVATAR;
      if (/^https?:\/\//i.test(photoUrl)) return photoUrl;

      let p = String(photoUrl).startsWith("/") ? String(photoUrl).slice(1) : String(photoUrl);
      if (p.startsWith("static/")) return "/" + p;
      return "/static/" + p;
    }

    async function apiFetchJson(url) {
      const { token, houseId } = getAuthContext();
      if (!token) return null;

      const headers = new Headers();
      headers.set("Accept", "application/json");
      headers.set("Authorization", "Bearer " + token);
      if (houseId) headers.set("X-House-Id", String(houseId));

      const res = await fetch(url, { headers });
      if (!res.ok) return null;
      try { return await res.json(); } catch { return null; }
    }

    // -------- header avatar --------
    async function loadHeaderMe() {
      const me = await apiFetchJson("/api/users/me");
      if (!me) return;

      if (headerUsername) headerUsername.innerText = (me.username || "Utilizador");

      if (headerImg) {
        headerImg.src = normalizePhotoUrl(me.photo_url);
        headerImg.onerror = () => { headerImg.src = DEFAULT_AVATAR; };
      }
    }

    // -------- search dropdown --------
    function hideDropdown() {
      dropdown.style.display = "none";
      dropdown.innerHTML = "";
    }

    function showDropdown() {
      dropdown.style.display = "block";
    }

    function goToUser(userId) {
      window.location.href = `/users/${encodeURIComponent(String(userId))}`;
    }

    async function apiSearchUsers(q, limit) {
      const url = `/api/users/search?q=${encodeURIComponent(q)}&limit=${encodeURIComponent(String(limit || 8))}`;
      const data = await apiFetchJson(url);
      return Array.isArray(data) ? data : [];
    }

    function renderResults(items) {
      if (!Array.isArray(items) || items.length === 0) {
        dropdown.innerHTML = `<div class="user-search-empty">Sem resultados.</div>`;
        showDropdown();
        return;
      }

      dropdown.innerHTML = items.map(u => {
        const id = u?.id;
        const username = (u?.username || "").trim() || "Utilizador";
        const photo = normalizePhotoUrl(u?.photo_url);

        return `
          <div class="user-search-item" role="button" tabindex="0" data-id="${String(id)}">
            <img class="user-search-avatar" src="${photo}" alt="">
            <div class="user-search-name">${username}</div>
          </div>
        `;
      }).join("");

      dropdown.querySelectorAll(".user-search-item").forEach(el => {
        const id = el.getAttribute("data-id");
        el.addEventListener("click", () => goToUser(id));
        el.addEventListener("keydown", (ev) => {
          if (ev.key === "Enter") goToUser(id);
        });
      });

      dropdown.querySelectorAll("img").forEach(img => {
        img.addEventListener("error", () => { img.src = DEFAULT_AVATAR; });
      });

      showDropdown();
    }

    let timer = null;

    async function handleInput() {
      const q = (input.value || "").trim();
      if (q.length < 2) { hideDropdown(); return; }

      const items = await apiSearchUsers(q, 8);
      renderResults(items);
    }

    input.addEventListener("input", () => {
      clearTimeout(timer);
      timer = setTimeout(handleInput, 250);
    });

    form.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const q = (input.value || "").trim();
      if (q.length < 2) return;

      const items = await apiSearchUsers(q, 1);
      if (items[0]?.id) goToUser(items[0].id);
      else renderResults([]);
    });

    document.addEventListener("click", (ev) => {
      const isInside = ev.target === input || dropdown.contains(ev.target);
      if (!isInside) hideDropdown();
    });

    input.addEventListener("keydown", (ev) => {
      if (ev.key === "Escape") hideDropdown();
    });

    document.addEventListener("DOMContentLoaded", loadHeaderMe);
    loadHeaderMe(); // fallback
  })();
</script>
